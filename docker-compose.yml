services:
  db:
    image: postgres:16-alpine
    container_name: blog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
      POSTGRES_DB: blog
    ports:
      # Host 5433 -> container 5432, para evitar conflito com um PostgreSQL
      # eventualmente já instalado na máquina (que costuma ocupar a 5432).
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U blog -d blog']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: blog-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://blog:blog@db:5432/blog?schema=public
    ports:
      - '3000:3000'

volumes:
  pgdata:
